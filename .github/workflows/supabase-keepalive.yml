name: Supabase Keep-Alive

on:
  schedule:
    # Roda toda segunda-feira às 09:00 UTC (bem dentro da janela de 7 dias do Supabase)
    - cron: '0 9 * * 1'
  workflow_dispatch: {} # permite rodar manualmente pela aba Actions do GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase para evitar pausa por inatividade
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/equipe?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
